<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Grains — Neon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; font-family: -apple-system, sans-serif; color: #fff; }
  canvas { display: block; }
  #hint {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 13px; text-align: center;
    pointer-events: none; transition: opacity 1s;
    z-index: 5;
  }
  #permBtn {
    display: none;
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 14px 28px; background: #fff; color: #111;
    border: none; border-radius: 12px;
    font-size: 16px; cursor: pointer;
    z-index: 5;
  }
  #backBtn {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Gire o celular para soltar os pixels ↓</div>
<button id="permBtn">Ativar sensor de movimento</button>
<button id="backBtn">&#8592; Menu</button>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
const { Engine, Events, Bodies, Body, World, Sleeping, Vector } = Matter;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const permBtn = document.getElementById('permBtn');
const backBtn = document.getElementById('backBtn');

backBtn.addEventListener('click', () => { window.location.href = 'index.html'; });

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); rebuildWalls(); });

const NEON_COLORS = [
  '#2CFF05', '#2323FF', '#FF6EC7', '#E0FF2E',
  '#FF5F1F', '#BC13FE', '#00FFFF', '#FF073A'
];

function randomNeonExcluding(exclude) {
  const av = NEON_COLORS.filter(c => c !== exclude);
  return av[Math.floor(Math.random() * av.length)];
}

const engine = Engine.create({ gravity: { x: 0, y: 1 }, enableSleeping: true });
const world = engine.world;

const PIXEL_SIZE = 18;
const GAP = 3;
const HIT_VELOCITY = 1.8;

const pixelMap = new Map();
let walls = [];
let wallSet = new Set();
let activated = false;
let toBreak = [];
let totalPixels = 0; // contagem inicial

// --- Vibração ---
const VIBRATE_THROTTLE = 120; // ms mínimo entre vibrações
let lastVibTime = 0;

function vibrateOnWallHit() {
  if (!navigator.vibrate) return;
  const now = Date.now();
  if (now - lastVibTime < VIBRATE_THROTTLE) return;
  lastVibTime = now;

  const ratio = totalPixels > 0 ? pixelMap.size / totalPixels : 0;
  // duração: 40ms quando cheio → ~5ms quando quase vazio
  const duration = Math.round(5 + ratio * 35);
  if (duration >= 5) navigator.vibrate(duration);
}

function createPixelBody(x, y, size, color, hits, gen, isStatic) {
  const body = Bodies.rectangle(x, y, size, size, {
    isStatic: isStatic || false,
    restitution: 0.2, friction: 0.8,
    frictionAir: 0.08, sleepThreshold: 30
  });
  body._color = color;
  body._size = size;
  body._hits = hits;
  body._gen = gen;
  World.add(world, body);
  pixelMap.set(body.id, body);
  return body;
}

function rebuildWalls() {
  walls.forEach(w => World.remove(world, w));
  wallSet.clear();
  const t = 60;
  walls = [
    Bodies.rectangle(W/2, H+t/2, W+100, t, { isStatic: true }),
    Bodies.rectangle(W/2, -t/2,  W+100, t, { isStatic: true }),
    Bodies.rectangle(-t/2, H/2,  t, H+100, { isStatic: true }),
    Bodies.rectangle(W+t/2, H/2, t, H+100, { isStatic: true }),
  ];
  walls.forEach(w => wallSet.add(w.id));
  World.add(world, walls);
}
rebuildWalls();

function buildPixels() {
  pixelMap.forEach(b => World.remove(world, b));
  pixelMap.clear();
  const cols = Math.floor(W / (PIXEL_SIZE + GAP));
  const rows = Math.floor(H / (PIXEL_SIZE + GAP));
  const offsetX = (W - cols * (PIXEL_SIZE + GAP)) / 2 + PIXEL_SIZE / 2;
  const offsetY = (H - rows * (PIXEL_SIZE + GAP)) / 2 + PIXEL_SIZE / 2;
  const emptyTop    = Math.floor(rows * 0.42);
  const emptyBottom = Math.floor(rows * 0.58);
  const emptyLeft   = Math.floor(cols * 0.30);
  const emptyRight  = Math.floor(cols * 0.70);
  function pickColor(r, c, grid) {
    const used = new Set();
    if (r > 0 && grid[r-1]?.[c]) used.add(grid[r-1][c]);
    if (c > 0 && grid[r]?.[c-1]) used.add(grid[r][c-1]);
    const av = NEON_COLORS.filter(x => !used.has(x));
    return av[Math.floor(Math.random() * av.length)] || NEON_COLORS[0];
  }
  const grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      if (r >= emptyTop && r < emptyBottom && c >= emptyLeft && c < emptyRight) {
        grid[r][c] = null; continue;
      }
      const x = offsetX + c * (PIXEL_SIZE + GAP);
      const y = offsetY + r * (PIXEL_SIZE + GAP);
      const color = pickColor(r, c, grid);
      grid[r][c] = color;
      createPixelBody(x, y, PIXEL_SIZE, color, 10, 0, true);
    }
  }
  totalPixels = pixelMap.size;
}
buildPixels();

Events.on(engine, 'collisionStart', (event) => {
  if (!activated) return;
  event.pairs.forEach(pair => {
    const { bodyA, bodyB } = pair;
    const relVel = Vector.magnitude(Vector.sub(bodyA.velocity, bodyB.velocity));

    // vibração: apenas quando um dos corpos é parede
    const hitsWall = wallSet.has(bodyA.id) || wallSet.has(bodyB.id);
    if (hitsWall && relVel >= HIT_VELOCITY) vibrateOnWallHit();

    if (relVel < HIT_VELOCITY) return;
    [bodyA, bodyB].forEach(b => {
      if (!pixelMap.has(b.id)) return;
      b._color = randomNeonExcluding(b._color);
      b._hits--;
      if (b._hits <= 0 && !toBreak.includes(b.id)) toBreak.push(b.id);
    });
  });
});

function breakPixel(body) {
  const { x, y } = body.position;
  const size = body._size;
  const color = body._color;
  const gen = body._gen;
  World.remove(world, body);
  pixelMap.delete(body.id);
  if (gen >= 1) return;
  const half = Math.floor(size / 2);
  [[-half/2, 0], [half/2, 0]].forEach(([dx, dy]) => {
    const newColor = randomNeonExcluding(color);
    const nb = createPixelBody(x+dx, y+dy, half, newColor, 6, 1, false);
    Body.applyForce(nb, nb.position, {
      x: (Math.random()-0.5)*0.002, y: -Math.random()*0.002
    });
  });
}

function releasePixels() {
  if (activated) return;
  activated = true;
  hint.style.opacity = '0';
  pixelMap.forEach(body => {
    Body.setStatic(body, false);
    Body.applyForce(body, body.position, {
      x: (Math.random()-0.5)*0.0008, y: (Math.random()-0.5)*0.0008
    });
  });
}

function activateSensors() {
  window.addEventListener('deviceorientation', (e) => {
    if (!activated) return;
    const beta  = (e.beta  || 0) * Math.PI / 180;
    const gamma = (e.gamma || 0) * Math.PI / 180;
    const newGx = Math.sin(gamma) * Math.cos(beta) * 2;
    const newGy = Math.sin(beta) * 2;
    if (Math.abs(newGx - engine.gravity.x) > 0.05 || Math.abs(newGy - engine.gravity.y) > 0.05) {
      engine.gravity.x = newGx;
      engine.gravity.y = newGy;
      pixelMap.forEach(b => Sleeping.set(b, false));
    }
  }, true);
}

function setupOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    permBtn.style.display = 'block';
    permBtn.addEventListener('click', async () => {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          permBtn.style.display = 'none';
          activateSensors();
          releasePixels();
        }
      } catch(e) { console.error(e); }
    });
  } else {
    activateSensors();
    window.addEventListener('deviceorientation', function first(e) {
      if (Math.abs(e.gamma) > 5 || Math.abs(e.beta) > 5) {
        releasePixels();
        window.removeEventListener('deviceorientation', first, true);
      }
    }, true);
    window.addEventListener('touchstart', releasePixels, { once: true });
  }
}
setupOrientation();

function drawPixel(body) {
  const size = body._size;
  const color = body._color;
  const maxHits = body._gen === 0 ? 10 : 6;
  const damage = 1 - (body._hits / maxHits);
  const { x, y } = body.position;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(body.angle);

  ctx.shadowColor = color;
  ctx.shadowBlur = 8 + damage * 10;

  ctx.globalAlpha = 1 - damage * 0.25;
  ctx.fillStyle = color;
  ctx.fillRect(-size/2, -size/2, size, size);

  if (damage > 0.4) {
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-size/4, -size/2); ctx.lineTo(size/4, size/2);
    ctx.stroke();
  }
  if (damage > 0.7) {
    ctx.beginPath();
    ctx.moveTo(size/2, -size/4); ctx.lineTo(-size/2, size/4);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-size/2, -size/2, size, size);
  ctx.restore();
}

function loop() {
  Engine.update(engine, 1000/60);
  if (toBreak.length > 0) {
    toBreak.forEach(id => { const b = pixelMap.get(id); if (b) breakPixel(b); });
    toBreak = [];
  }
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  pixelMap.forEach(b => drawPixel(b));
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
